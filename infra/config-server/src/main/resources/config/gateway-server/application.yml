server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:

        - id: user-service-admin
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**


        - id: category-service-admin
          uri: lb://main-service
          predicates:
            - Path=/admin/categories/**

        - id: category-service-public
          uri: lb://main-service
          predicates:
            - Path=/categories/**


        - id: compilation-service-admin
          uri: lb://main-service
          predicates:
            - Path=/admin/compilations/**

        - id: compilation-service-public
          uri: lb://main-service
          predicates:
            - Path=/compilations/**


        - id: event-service-admin
          uri: lb://main-service
          predicates:
            - Path=/admin/events/**

        - id: event-service-public
          uri: lb://main-service
          predicates:
            - Path=/events/**

        - id: event-service-private
          uri: lb://main-service
          predicates:
            - Path=/users/*/events/**


        - id: request-service-private-requests
          uri: lb://main-service
          predicates:
            - Path=/users/*/requests/**

        - id: request-service-private-events
          uri: lb://main-service
          predicates:
            - Path=/users/*/events/*/requests/**


        - id: rating-service-private
          uri: lb://main-service
          predicates:
            - Path=/private/events/**

        - id: rating-service-public
          uri: lb://main-service
          predicates:
            - Path=/public/events/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
      base-path: /actuator
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always
  info:
    env:
      enabled: true

logging:
  level:
    com.netflix.discovery: DEBUG
    org.springframework.cloud.gateway: TRACE
    org.springframework.cloud.gateway.handler: DEBUG
    org.springframework.cloud.gateway.route: DEBUG
    org.springframework.web.reactive: DEBUG
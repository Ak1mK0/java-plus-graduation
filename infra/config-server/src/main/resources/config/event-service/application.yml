server:
  port: 0

spring:
  application:
    name: event-service
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          stats-server:
            connectTimeout: 3000
            readTimeout: 5000
            loggerLevel: full
  datasource:
    url: jdbc:postgresql://localhost:5433/event-service
    username: event
    password: event
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false

resilience4j:
  circuitbreaker:
    instances:
      stats-server:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        permittedNumberOfCallsInHalfOpenState: 5
        registerHealthIndicator: true
        automaticTransitionFromOpenToHalfOpenEnabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    ru.practicum: DEBUG
    ru.practicum.fallback: DEBUG
    ru.practicum.faign: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    feign: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level --- [%thread] %logger{36} : %msg%n"